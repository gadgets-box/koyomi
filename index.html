<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "WebSite",
  "name": "今日の暦",
  "alternateName": "Today's Almanac",
  "url": "https://example.com/",

<body>

<header class="site-header">
  <h1 class="site-title" id="siteTitleWrap">
    <span id="siteTitle">今日の暦</span>
    <small id="siteTagline">日めくりカレンダー</small>
  </h1>
  <button class="lang-toggle" id="langToggle" type="button">English</button>
</header>

<main class="calendar-stack">
  <div class="stack-page s2" aria-hidden="true"></div>
  <div class="stack-page s1" aria-hidden="true"></div>

  <section class="calendar-page" aria-label="今日の暦">
    <div class="ring-holes" aria-hidden="true"><span></span><span></span></div>

    <div class="page-topline">
      <button class="nav-btn" id="prevDayBtn" type="button" aria-label="前の日へ">&#8249;</button>
      <button class="today-jump" id="todayJump" type="button">今日に戻る</button>
      <button class="nav-btn" id="nextDayBtn" type="button" aria-label="次の日へ">&#8250;</button>
    </div>

    <div class="date-hero">
      <div class="date-number" id="dateNumber">1</div>
    </div>
    <div class="date-meta">
      <div class="month-year" id="monthYear">2026年1月</div>
      <span class="weekday-badge" id="weekdayBadge">木曜日</span>
    </div>

    <div class="info-grid">
      <div class="info-card">
        <div class="label" id="lunarLabel">旧暦</div>
        <div class="value" id="lunarValue">—</div>
      </div>
      <div class="info-card">
        <div class="label" id="rokuyoLabel">六曜</div>
        <div class="value" id="rokuyoValue">—</div>
      </div>
      <div class="info-card" style="grid-column: 1 / -1;">
        <div class="label" id="sekkiLabel">二十四節気</div>
        <div class="value" id="sekkiValue">—</div>
        <div class="sub" id="sekkiSub"></div>
      </div>
    </div>

    <div class="feature-row">
      <div class="illustration-frame" id="illustrationFrame" aria-hidden="true"></div>

      <div class="history-block">
        <h2 id="historyTitle">今日は何の日</h2>
        <div class="history-tabs" role="tablist">
          <button class="history-tab" id="tabEvents" role="tab" aria-selected="true" type="button">できごと</button>
          <button class="history-tab" id="tabBirths" role="tab" aria-selected="false" type="button">誕生</button>
        </div>
        <ul class="history-list" id="historyList" aria-live="polite">
          <li>読み込み中…</li>
        </ul>
        <div class="history-note" id="historySource">出典: ウィキペディア</div>
      </div>
    </div>

    <div class="birthday-block">
      <h2 id="birthdaySectionTitle">生まれてから何日目？</h2>
      <div class="birthday-row">
        <div class="birthday-input-row">
          <input type="date" id="birthdayInput" aria-label="生年月日を選択">
          <button class="small-btn primary" id="birthdaySetBtn" type="button">誕生日を設定</button>
          <button class="small-btn" id="birthdayClearBtn" type="button" style="display:none;">設定を削除</button>
        </div>
        <div class="birthday-count" id="birthdayResult"></div>
      </div>
      <div class="birthday-hint" id="birthdayHint">設定はこの端末のブラウザに保存され、他の人には共有されません。</div>
    </div>

    <div class="share-row">
      <span id="shareLabel">この日をシェア</span>
      <button id="shareBtn" type="button">🔗</button>
    </div>
  </section>

  <div class="perforation" aria-hidden="true"></div>
</main>

<p class="keyboard-hint" id="keyboardHint">← → キーで日付を移動できます</p>

<footer class="site-footer">
  <a href="#top" id="backToTop">トップへ戻る</a><br>

</footer>

</html>
